# 几何容差配置。所有 L1 判定阈值必须从此处读取，避免硬编码。
geometry:
  max_angle_deg: 0.05
  max_distance_mm: 0.005
  max_axis_angle_deg: 0.05
  max_radius_ratio: 0.01
  min_overlap_length_ratio: 0.05
  min_circumferential_overlap_ratio: 0.01
  min_circumferential_overlap_deg: 1.0
  full_circle_angle_tol_deg: 0.1
  cylinder_domain_sample_count: 16
  min_planar_overlap_area_mm2: 0.000001
  min_planar_overlap_ratio: 0.0
  min_tangency_overlap_length_mm: 0.000001
  min_tangency_overlap_ratio: 0.0
  plane_edge_sample_count: 16
  max_plane_polygon_vertices: 256
  search_radius: 0.01
  overlap_min_ratio: 0.0
  bbox_overlap_min_ratio: 0.0
  fingerprint_abs_tol: 0.0001

spatial_index:
  bvh_leaf_size: 8
  bvh_max_depth: null
