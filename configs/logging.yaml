# 日志配置。common.logging.get_logger 会读取本文件。
version: 1
disable_existing_loggers: false
formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    level: INFO
loggers:
  l0:
    level: INFO
    handlers: [console]
    propagate: false
  l1:
    level: INFO
    handlers: [console]
    propagate: false
  pipeline:
    level: INFO
    handlers: [console]
    propagate: false
root:
  level: WARNING
  handlers: [console]

